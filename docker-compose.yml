version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: intellihr-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - intellihr-network
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: intellihr-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=UTC
      - N8N_METRICS=true
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - intellihr-network
    depends_on:
      - mongodb
    restart: always

volumes:
  mongo-data:
  n8n-data:

networks:
  intellihr-network:
    driver: bridge
